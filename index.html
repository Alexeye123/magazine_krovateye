<!DOCTYPE html>
<html lang="ru">

<head>
	<meta charset="UTF-8">
	<title>Магазин кроватей</title>
	<link rel="stylesheet" href="styles.css">
</head>

<body>

	<!-- TOPBAR -->
	<div class="topbar">
		<div>Возможна оплата в 3 или 4 рассрочки без комиссии</div>
		<div class="socials">
			<span>📘</span>
			<span>📸</span>
			<span>🎵</span>
		</div>
	</div>

	<!-- HEADER -->
	<header class="header">
		<div class="logo">🛏 BED SHOP</div>
		<input type="text" placeholder="Поиск...">
		<div id="cart">🛒 0</div>
	</header>

	<!-- NAV -->
	<nav class="nav">
		<div class="catalog">
			☰ Каталог
			<div class="dropdown">
				<a href="#">Кровати</a>
				<a href="#">Матрасы</a>
				<a href="#">Диваны</a>
				<a href="#">Шкафы</a>
			</div>
		</div>

		<div class="nav-links">
			<a href="#">Оплата</a>
			<a href="#">Доставка</a>
			<a href="#">Контакты</a>
		</div>
	</nav>

	<!-- 🚀 ПРОЛЁТ -->
	<section class="hero">
		<div class="track">
			<!-- первый набор -->
			<div class="frame f1"></div>
			<div class="frame f2"></div>
			<div class="frame f3"></div>
			<div class="frame f4"></div>

			<!-- дубликат для бесконечности -->
			<div class="frame f1"></div>
			<div class="frame f2"></div>
			<div class="frame f3"></div>
			<div class="frame f4"></div>
		</div>

		<div class="hero-content">
		</div>
	</section>

	<!-- PRODUCTS -->
	<main class="products" id="products"></main>

	<!-- FOOTER -->
	<footer class="footer">
		© Магазин кроватей 2026
	</footer>

	<script>
		const products = [
			{ id: 1, name: "Кровать Лофт", price: 12000, oldPrice: 15000, image: "https://via.placeholder.com/300" },
			{ id: 2, name: "Кровать Минимал", price: 18000, oldPrice: 22000, image: "https://via.placeholder.com/300" },
			{ id: 3, name: "Кровать Дабл", price: 25000, oldPrice: 30000, image: "https://via.placeholder.com/300" },
			{ id: 4, name: "Кровать Премиум", price: 32000, oldPrice: 40000, image: "https://via.placeholder.com/300" }
		];

		let cart = 0;

		function render() {
			const container = document.getElementById("products");
			container.innerHTML = "";

			products.forEach(p => {
				const el = document.createElement("div");
				el.className = "card";

				el.innerHTML = `
      <div class="badge">-${Math.round((1 - p.price / p.oldPrice) * 100)}%</div>
      <img src="${p.image}">
      <h3>${p.name}</h3>
      <p><span class="old">${p.oldPrice} ₽</span><br><b>${p.price} ₽</b></p>
      <button onclick="addToCart()">В корзину</button>
    `;

				container.appendChild(el);
			});
		}

		function addToCart() {
			cart++;
			document.getElementById("cart").innerText = "🛒 " + cart;
		}

		render();
	</script>

</body>

</html>
