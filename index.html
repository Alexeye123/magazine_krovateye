<!DOCTYPE html>
<html lang="ru">

<head>
	<meta charset="UTF-8">
	<title>Магазин кроватей</title>
	<link rel="stylesheet" href="styles.css">
</head>

<body>


	<!-- 🔝 ВЕРХНЯЯ ПОЛОСА -->
	<div class="topbar">
		<div>Возможна оплата в 3 или 4 рассрочки без комиссии</div>
		<div class="socials">
			<span>📘</span>
			<span>📸</span>
			<span>🎵</span>
		</div>
	</div>

	<!-- 🔝 ШАПКА -->
	<header class="header">
		<div class="logo">🛏 BED SHOP</div>
		<input type="text" placeholder="Поиск...">
		<div id="cart">🛒 0</div>
	</header>

	<!-- 🔽 НАВИГАЦИЯ -->
	<nav class="nav">
		<div class="catalog">
			☰ Каталог
			<div class="dropdown">
				<a href="#">Кровати</a>
				<a href="#">Матрасы</a>
				<a href="#">Диваны</a>
				<a href="#">Шкафы</a>
			</div>
		</div>

		<div class="nav-links">
			<a href="#">Оплата</a>
			<a href="#">Доставка</a>
			<a href="#">Контакты</a>
		</div>
	</nav>

	<!-- 🖼 слайдер -->
	<section class="hero">
		<div class="slider">

			<div class="slide active"
				style="background-image:url('https://images.unsplash.com/photo-1501785888041-af3ef285b470')"></div>
			<div class="slide"
				style="background-image:url('https://images.unsplash.com/photo-1500530855697-b586d89ba3ee')"></div>
			<div class="slide"
				style="background-image:url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e')"></div>
			<div class="slide"
				style="background-image:url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e')"></div>

		</div>

		<!-- стрелки -->
		<div class="arrow left" onclick="prevSlide()">❮</div>
		<div class="arrow right" onclick="nextSlide()">❯</div>

		<!-- точки -->
		<div class="dots"></div>

		<div class="hero-content">
			<h2>Подберите идеальную кровать</h2>
			<button>Подобрать</button>
		</div>
	</section>

	<!-- 📦 КАТАЛОГ -->
	<main class="products" id="products"></main>

	<!-- 🔻 ПОДВАЛ -->
	<footer class="footer">
		© Магазин кроватей 2026
	</footer>

	<script>
		const products = [
			{ id: 1, name: "Кровать Лофт", price: 12000, oldPrice: 15000, image: "https://via.placeholder.com/300" },
			{ id: 2, name: "Кровать Минимал", price: 18000, oldPrice: 22000, image: "https://via.placeholder.com/300" },
			{ id: 3, name: "Кровать Дабл", price: 25000, oldPrice: 30000, image: "https://via.placeholder.com/300" },
			{ id: 4, name: "Кровать Премиум", price: 32000, oldPrice: 40000, image: "https://via.placeholder.com/300" }
		];

		let cart = 0;

		function render() {
			const container = document.getElementById("products");
			container.innerHTML = "";

			products.forEach(p => {
				const el = document.createElement("div");
				el.className = "card";

				el.innerHTML = `
      <div class="badge">-${Math.round((1 - p.price / p.oldPrice) * 100)}%</div>
      <img src="${p.image}">
      <h3>${p.name}</h3>
      <p><span class="old">${p.oldPrice} ₽</span><br><b>${p.price} ₽</b></p>
      <button onclick="addToCart()">В корзину</button>
    `;

				container.appendChild(el);
			});
		}

		function addToCart() {
			cart++;
			document.getElementById("cart").innerText = "🛒 " + cart;
		}

		render();
	</script>
	<script>
		const slides = document.querySelectorAll('.slide');
		const dotsContainer = document.querySelector('.dots');

		let index = 0;
		let interval;

		// создаём точки
		slides.forEach((_, i) => {
			const dot = document.createElement('span');
			dot.onclick = () => goToSlide(i);
			dotsContainer.appendChild(dot);
		});

		const dots = document.querySelectorAll('.dots span');

		function showSlide(i) {
			slides.forEach(s => s.classList.remove('active'));
			dots.forEach(d => d.classList.remove('active'));

			slides[i].classList.add('active');
			dots[i].classList.add('active');
		}

		function nextSlide() {
			index = (index + 1) % slides.length;
			showSlide(index);
		}

		function prevSlide() {
			index = (index - 1 + slides.length) % slides.length;
			showSlide(index);
		}

		function goToSlide(i) {
			index = i;
			showSlide(index);
		}

		// автопрокрутка
		function startSlider() {
			interval = setInterval(nextSlide, 4000);
		}

		function stopSlider() {
			clearInterval(interval);
		}

		// пауза при наведении
		document.querySelector('.hero').addEventListener('mouseenter', stopSlider);
		document.querySelector('.hero').addEventListener('mouseleave', startSlider);

		// старт
		showSlide(index);
		startSlider();
	</script>

</body>

</html>
